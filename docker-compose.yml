services:
  vggt-omega:
    build:
      context: .
      dockerfile: Dockerfile
    image: vggt-omega:local
    working_dir: /app
    environment:
      PYTHONPATH: /app
      VGGT_OMEGA_CHECKPOINT: ${VGGT_OMEGA_CHECKPOINT:-/app/checkpoints/VGGT-Omega-1B-512/model.pt}
      VGGT_OMEGA_IMAGE_RESOLUTION: ${VGGT_OMEGA_IMAGE_RESOLUTION:-512}
    volumes:
      - type: bind
        source: .
        target: /app
      - type: bind
        source: /tmp
        target: /tmp
    ports:
      - "${VGGT_OMEGA_PORT:-7860}:7860"
    ipc: host
    gpus: all
    command:
      - python
      - demo_gradio.py
      - --checkpoint
      - ${VGGT_OMEGA_CHECKPOINT:-/app/checkpoints/VGGT-Omega-1B-512/model.pt}
      - --image-resolution
      - ${VGGT_OMEGA_IMAGE_RESOLUTION:-512}
      - --server-name
      - 0.0.0.0
      - --server-port
      - "7860"

